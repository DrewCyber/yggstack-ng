name: Build

on:
  push:
    tags: ['v*']
  workflow_dispatch:

jobs:
  build:
    name: Build (${{ matrix.artifact }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-musl
            artifact: yggstack-linux-amd64
            use_cross: true

          - os: ubuntu-latest
            target: aarch64-unknown-linux-musl
            artifact: yggstack-linux-arm64
            use_cross: true

          - os: macos-latest
            target: x86_64-apple-darwin
            artifact: yggstack-macos-amd64
            use_cross: false

          - os: macos-latest
            target: aarch64-apple-darwin
            artifact: yggstack-macos-arm64
            use_cross: false

          - os: windows-latest
            target: x86_64-pc-windows-msvc
            artifact: yggstack-windows-amd64
            use_cross: false

          - os: windows-latest
            target: aarch64-pc-windows-msvc
            artifact: yggstack-windows-arm64
            use_cross: false

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Cache Cargo registry
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
          key: ${{ runner.os }}-${{ matrix.target }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-${{ matrix.target }}-cargo-

      - name: Install cross
        if: matrix.use_cross
        run: cargo install cross --locked

      - name: Build with cross
        if: matrix.use_cross
        run: cross build --release --target ${{ matrix.target }}

      - name: Build with cargo
        if: '!matrix.use_cross'
        run: cargo build --release --target ${{ matrix.target }}

      - name: Stage binary (Unix)
        if: runner.os != 'Windows'
        run: cp target/${{ matrix.target }}/release/yggstack ${{ matrix.artifact }}

      - name: Stage binary (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: cp target/${{ matrix.target }}/release/yggstack.exe ${{ matrix.artifact }}.exe

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: ${{ matrix.artifact }}*
          if-no-files-found: error

  release:
    name: Create GitHub Release
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')
    permissions:
      contents: write
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          files: artifacts/*
          generate_release_notes: true
