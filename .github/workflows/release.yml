name: Release

on:
  push:
    tags: ["v*"]

permissions:
  contents: write

jobs:
  # ── Linux (musl static binaries via cross) ───────────────────────────────────
  build-linux:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - target: x86_64-unknown-linux-musl
            artifact: yggstack-linux-amd64
          - target: aarch64-unknown-linux-musl
            artifact: yggstack-linux-arm64
          - target: armv7-unknown-linux-musleabihf
            artifact: yggstack-linux-armv7

    steps:
      - uses: actions/checkout@v6

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install cross
        run: cargo install cross --git https://github.com/cross-rs/cross

      - name: Build
        run: cross build -p yggstack --release --target ${{ matrix.target }}

      - name: Rename binary
        run: |
          cp target/${{ matrix.target }}/release/yggstack ${{ matrix.artifact }}

      - name: Upload artifact
        uses: actions/upload-artifact@v4.6.2
        with:
          name: ${{ matrix.artifact }}
          path: ${{ matrix.artifact }}

      - name: Attach to release
        uses: softprops/action-gh-release@v2
        with:
          files: ${{ matrix.artifact }}

  # ── macOS (native + universal) ───────────────────────────────────────────────
  build-macos:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v6

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-apple-darwin,x86_64-apple-darwin

      - name: Build x86_64
        run: cargo build -p yggstack --release --target x86_64-apple-darwin

      - name: Build arm64
        run: cargo build -p yggstack --release --target aarch64-apple-darwin

      - name: Create universal binary
        run: |
          lipo -create \
            target/x86_64-apple-darwin/release/yggstack \
            target/aarch64-apple-darwin/release/yggstack \
            -output yggstack-macos-universal

      - name: Rename per-arch binaries
        run: |
          cp target/x86_64-apple-darwin/release/yggstack yggstack-macos-amd64
          cp target/aarch64-apple-darwin/release/yggstack yggstack-macos-arm64

      - name: Upload artifacts
        uses: actions/upload-artifact@v4.6.2
        with:
          name: yggstack-macos
          path: |
            yggstack-macos-universal
            yggstack-macos-amd64
            yggstack-macos-arm64

      - name: Attach to release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            yggstack-macos-universal
            yggstack-macos-amd64
            yggstack-macos-arm64

  # ── Android CLI (binary via cross) ──────────────────────────────────────────
  build-android-cli:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - target: aarch64-linux-android
            artifact: yggstack-android-arm64
          - target: armv7-linux-androideabi
            artifact: yggstack-android-armv7
          - target: x86_64-linux-android
            artifact: yggstack-android-amd64

    steps:
      - uses: actions/checkout@v6

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install cross
        run: cargo install cross --git https://github.com/cross-rs/cross

      - name: Build
        run: cross build -p yggstack --release --target ${{ matrix.target }}

      - name: Rename binary
        run: cp target/${{ matrix.target }}/release/yggstack ${{ matrix.artifact }}

      - name: Upload artifact
        uses: actions/upload-artifact@v4.6.2
        with:
          name: ${{ matrix.artifact }}
          path: ${{ matrix.artifact }}

      - name: Attach to release
        uses: softprops/action-gh-release@v2
        with:
          files: ${{ matrix.artifact }}

  # ── Android (.so via cargo-ndk) — CI only, not released ─────────────────────
  build-android:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - target: aarch64-linux-android
          - target: armv7-linux-androideabi
          - target: x86_64-linux-android

    steps:
      - uses: actions/checkout@v6

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install cargo-ndk
        run: cargo install cargo-ndk

      - name: Build
        run: cargo ndk -t ${{ matrix.target }} build -p yggstack-mobile --release

  # ── Windows ──────────────────────────────────────────────────────────────────
  build-windows:
    runs-on: windows-latest
    strategy:
      matrix:
        include:
          - target: x86_64-pc-windows-msvc
            artifact: yggstack-windows-amd64.exe
          - target: aarch64-pc-windows-msvc
            artifact: yggstack-windows-arm64.exe

    steps:
      - uses: actions/checkout@v6

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Build
        run: cargo build -p yggstack --release --target ${{ matrix.target }}

      - name: Rename binary
        shell: bash
        run: |
          cp target/${{ matrix.target }}/release/yggstack.exe ${{ matrix.artifact }}

      - name: Upload artifact
        uses: actions/upload-artifact@v4.6.2
        with:
          name: ${{ matrix.artifact }}
          path: ${{ matrix.artifact }}

      - name: Attach to release
        uses: softprops/action-gh-release@v2
        with:
          files: ${{ matrix.artifact }}
